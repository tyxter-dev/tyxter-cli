name: tyxter-cli

services:
  tyxter-cli:
    image: ${TYXTER_CLI_IMAGE:-tyxter-cli:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tyxter-cli
    restart: unless-stopped
    environment:
      TYXTER_API_URL: ${TYXTER_API_URL:-https://api.tyxter.dev}
      TYXTER_API_KEY: ${TYXTER_API_KEY:?Set TYXTER_API_KEY in .env or your shell}
      TYXTER_WEBHOOK_FORWARD_URL: ${TYXTER_WEBHOOK_FORWARD_URL:?Set TYXTER_WEBHOOK_FORWARD_URL in .env or your shell}
      TYXTER_WEBHOOK_SECRET: ${TYXTER_WEBHOOK_SECRET:-}
      TYXTER_WEBHOOK_CURSOR: ${TYXTER_WEBHOOK_CURSOR:-}
      TYXTER_WEBHOOK_EVENT_TYPE: ${TYXTER_WEBHOOK_EVENT_TYPE:-}
      TYXTER_WEBHOOK_EVENTS: ${TYXTER_WEBHOOK_EVENTS:-}
      TYXTER_WEBHOOK_LIMIT: ${TYXTER_WEBHOOK_LIMIT:-20}
      TYXTER_WEBHOOK_WAIT_MS: ${TYXTER_WEBHOOK_WAIT_MS:-25000}
      TYXTER_WEBHOOK_POLL_INTERVAL_MS: ${TYXTER_WEBHOOK_POLL_INTERVAL_MS:-1000}
      TYXTER_WEBHOOK_MAX_POLL_INTERVAL_MS: ${TYXTER_WEBHOOK_MAX_POLL_INTERVAL_MS:-30000}
      TYXTER_CLI_STATE_DIR: /data
    volumes:
      - tyxter-cli-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  tyxter-cli-data:
